<form (ngSubmit)="guardar()" class="form-container">
  <div class="form-group">
    <label for="nombre">Nombre</label>
    <input
      type="text"
      id="nombre"
      name="nombre"
      [(ngModel)]="nombre"
      placeholder="Ej. Mouse Gamer"
      class="form-control"
      autocomplete="off"
    />
  </div>

  <div class="form-group">
    <label for="precio">Precio</label>
    <input
      type="number"
      id="precio"
      name="precio"
      [(ngModel)]="precio"
      placeholder="Ej. 20000"
      class="form-control"
    />
    @if (precio !== null && precio <= 0) {
      <span class="error-msg">El precio debe ser mayor a 0</span>
    }
  </div>

  <div class="form-actions">
    <button
      type="submit"
      [disabled]="!isValid()"
      class="btn btn-primary"
      [class.btn-actualizar]="isEditing"
    >
      {{ isEditing ? 'Actualizar' : 'Crear' }}
    </button>

    @if (isEditing) {
      <button
        type="button"
        (click)="limpiar()"
        class="btn btn-cancelar"
      >
        Cancelar
      </button>
    }
  </div>
</form>
