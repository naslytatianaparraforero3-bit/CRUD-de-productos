<div class="list-container">
  @if (products.length === 0) {
    <div class="empty-state">
      <div class="icon-circle">
        <svg class="warning-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <p class="empty-text">No tenemos productos para mostrarte Alejo :(</p>
    </div>
  } @else {
    <div class="products-grid">
      @for (product of products; track product.id) {
        <app-product-card
          [product]="product"
          (delete)="eliminar($event)"
          (select)="seleccionar($event)"
        ></app-product-card>
      }
    </div>
  }
</div>
